services:
  - type: web
    name: project-demo-ocr
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 300 app:app
    healthCheckPath: /api/models
    envVars:
      - key: FLASK_ENV
        value: production
      - key: TF_USE_LEGACY_KERAS
        value: "1"
      - key: UPLOAD_FOLDER
        value: /tmp/uploads
      - key: PYTHON_VERSION
        value: 3.12.3
