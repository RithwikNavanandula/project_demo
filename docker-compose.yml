version: '3.8'

services:
  hindi-ocr:
    build: .
    container_name: hindi-ocr-app
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./model_hindi:/app/model_hindi
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
